# Manually triggered release-document generation pipeline.
#
# Runner: all jobs target [self-hosted, windows] — GitHub-hosted runners
# are disabled for this org. This requires a self-hosted runner registered
# to this repo (or org) carrying at least those two labels; adjust the
# runs-on label set below if your runner is registered with different
# labels. All run: steps use `shell: pwsh` (native PowerShell) — an
# earlier version of this workflow used `shell: bash`, which on this
# runner resolved to the built-in WSL launcher shim ahead of Git Bash on
# PATH and failed with "execvpe(/bin/bash) failed". Native pwsh sidesteps
# that ambiguity entirely rather than depending on which bash.exe wins.
#
# Self-hosted runners reuse the same disk across every run — unlike
# GitHub-hosted runners, nothing is torn down for you automatically.
# actions/checkout-managed paths clean themselves (git clean -ffdx) at the
# START of their next checkout, but anything created outside a checkout
# (the docs-output clone, the manually-cloned automation-repo, generated
# JSON/Markdown) does not. Each job ends with an `if: always()` cleanup
# step so leftovers don't survive a failed run either — a plain
# `if: success()` (the default) would skip cleanup exactly when it's
# needed most.
#
# Required repo Variables (Settings > Secrets and variables > Actions > Variables):
#   APP_REPO                 owner/name of the app repo code-scanner diffs, e.g. "acme/storefront"
#   AUTOMATION_REPO          owner/name of the .NET BDD/Page-Object automation repo
#   AUTOMATION_REPO_SUBPATH  (optional) subdirectory within the automation repo containing .feature files
#   DOCS_REPO                (optional) owner/name of the repo the draft is committed to; defaults to this repo
#   LLM_PROVIDER             "dummy" (default, no credentials needed) or "bedrock"
#   BEDROCK_MODEL_ID         required when LLM_PROVIDER=bedrock
#   AWS_REGION               required when LLM_PROVIDER=bedrock
#   KNOWN_MODULES            (optional) comma-separated list of the app's real module names, e.g.
#                              "Payments,Orders,Inventory,Shipping". Without it, orphan-test gaps
#                              (test coverage for a module with zero code changes this release)
#                              cannot be detected — see the "Build mapping" step for why.
#
# Required repo Secrets:
#   APP_REPO_TOKEN            token with read access to APP_REPO (contents)
#   AUTOMATION_REPO_TOKEN     token with read access to AUTOMATION_REPO (contents)
#   DOCS_REPO_TOKEN           (optional) token with write access to DOCS_REPO; falls back to the
#                              workflow's default GITHUB_TOKEN when DOCS_REPO is this repo
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN
#                              only needed when LLM_PROVIDER=bedrock and you're not using OIDC
#
# Note: this workflow only pushes the draft branch — it does not open a
# pull request (that step was deferred; see src/orchestrator, which
# covers the full scan -> map -> draft -> branch -> PR flow as a plain
# Node CLI instead, for environments where this runner setup is painful).

name: Generate Release Document

on:
  workflow_dispatch:
    inputs:
      previous_ref:
        description: 'Previous release branch/tag — the "from" side of the code diff, e.g. release/25.2.0'
        required: true
        type: string
      current_ref:
        description: 'Current release branch/tag — the "to" side of the code diff, e.g. release/25.3.0'
        required: true
        type: string
      test_tag_version:
        description: 'Release label automation tests are tagged with, e.g. 25.3 — independent of the branch naming used by previous_ref/current_ref'
        required: true
        type: string
      test_branch:
        description: 'Branch (or tag) of the automation repo to check out and scan for .feature tags; blank uses its default branch'
        required: false
        type: string
      module:
        description: 'Module to document, or "All" for every module'
        required: true
        default: 'All'
        type: string

concurrency:
  group: release-${{ inputs.test_tag_version }}-${{ inputs.module }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

jobs:
  scan-code:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-npm
      - name: Scan code changes
        # --base/--head accept either a tag or a branch name — the GitHub
        # compare API resolves both the same way, no special-casing needed.
        env:
          GITHUB_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: npm run scan:code -- --repo "${{ vars.APP_REPO }}" --base "${{ inputs.previous_ref }}" --head "${{ inputs.current_ref }}" --out code-scan.json
      - uses: actions/upload-artifact@v4
        with:
          name: code-scan
          path: code-scan.json
          retention-days: 1

  scan-tests:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-npm
      - name: Clone automation repository
        env:
          AUTOMATION_REPO_TOKEN: ${{ secrets.AUTOMATION_REPO_TOKEN }}
        run: |
          $repoUrl = "https://x-access-token:${env:AUTOMATION_REPO_TOKEN}@github.com/${{ vars.AUTOMATION_REPO }}.git"
          if ("${{ inputs.test_branch }}" -ne "") {
            git clone --branch "${{ inputs.test_branch }}" $repoUrl automation-repo
          } else {
            git clone $repoUrl automation-repo
          }
      - name: Scan test coverage
        # test_tag_version drives the tag filter here, not previous_ref/
        # current_ref — the automation repo's .feature tags follow their
        # own convention, independent of the app repo's branch naming.
        run: npm run scan:test -- --path "automation-repo/${{ vars.AUTOMATION_REPO_SUBPATH }}" --release "${{ inputs.test_tag_version }}" --module "${{ inputs.module }}" --out test-scan.json
      - uses: actions/upload-artifact@v4
        with:
          name: test-scan
          path: test-scan.json
          retention-days: 1
      - name: Clean up cloned repository
        if: always()
        run: Remove-Item -Path "automation-repo" -Recurse -Force -ErrorAction SilentlyContinue

  map-and-draft:
    needs: [scan-code, scan-tests]
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-npm
      - uses: actions/download-artifact@v4
        with:
          name: code-scan
      - uses: actions/download-artifact@v4
        with:
          name: test-scan

      - name: Build mapping
        # KNOWN_MODULES (repo Variable, comma-separated) is the app's real
        # module vocabulary. test-scanner's modulesObserved is NOT a safe
        # substitute here — it's every non-numeric tag seen (including
        # @Smoke, @Regression, etc.), and feeding that into --modules
        # produces false-positive orphan-test gaps for QA-priority tags
        # that aren't modules at all. Until KNOWN_MODULES is populated,
        # orphan-test gaps (test coverage with zero code changes) simply
        # won't be detected — untested-change gaps are unaffected.
        run: |
          npm run map -- --code code-scan.json --tests test-scan.json --release "${{ inputs.test_tag_version }}" --modules "${{ vars.KNOWN_MODULES }}" --out mapping.json
          Copy-Item -Path "mapping.json" -Destination "evidence.json"

      - name: Draft release document
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'dummy' }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: npm run draft -- --mapping mapping.json --code code-scan.json --module "${{ inputs.module }}" --out release-doc.md

      - name: Commit draft to a branch
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN || github.token }}
        run: |
          $DOCS_REPO = "${{ vars.DOCS_REPO || github.repository }}"
          $sanitize = {
            param($str)
            $str = $str.ToLower()
            $str = [regex]::Replace($str, '[^a-z0-9]', '-')
            $str = [regex]::Replace($str, '-+', '-')
            $str = $str -replace '^-+|-+$', ''
            return $str
          }
          $SAFE_RELEASE = & $sanitize "${{ inputs.test_tag_version }}"
          $SAFE_MODULE = & $sanitize "${{ inputs.module }}"
          $BRANCH = "release-doc/$SAFE_RELEASE-$SAFE_MODULE-${{ github.run_id }}"

          if (Test-Path "docs-output") { Remove-Item -Path "docs-output" -Recurse -Force }
          git clone "https://x-access-token:${env:DOCS_REPO_TOKEN}@github.com/${DOCS_REPO}.git" docs-output
          Push-Location docs-output
          git checkout -b "$BRANCH"

          $DOC_DIR = "releases/$SAFE_RELEASE/$SAFE_MODULE"
          New-Item -Path $DOC_DIR -ItemType Directory -Force | Out-Null
          Copy-Item -Path "../release-doc.md" -Destination "$DOC_DIR/release-doc.md" -Force
          Copy-Item -Path "../evidence.json" -Destination "$DOC_DIR/evidence.json" -Force

          git config user.name "release-doc-bot"
          git config user.email "release-doc-bot@users.noreply.github.com"
          git add .
          git commit -m "Draft release doc for ${{ inputs.test_tag_version }} (${{ inputs.module }})"
          git push origin "$BRANCH"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "branch=$BRANCH"
          Pop-Location
        id: commit

      - name: Clean up generated output
        # Also removes docs-output's embedded access token (in its
        # .git/config, from the x-access-token clone URL) rather than
        # leaving it sitting on disk until the next run overwrites it.
        if: always()
        run: |
          Remove-Item -Path "code-scan.json" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "test-scan.json" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "mapping.json" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "evidence.json" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "release-doc.md" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "docs-output" -Recurse -Force -ErrorAction SilentlyContinue
